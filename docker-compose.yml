services:
  postgres:
    image: postgres:17
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: expressjs
      POSTGRES_USER: jefred
      POSTGRES_PASSWORD: admin123
    ports:
    - "5433:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data
    networks:
    - backend_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    restart: unless-stopped
    depends_on:
    - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mail.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
    - "5050:80"
    volumes:
    - pgadmin_data:/var/lib/pgadmin
    networks:
    - backend_network
  
volumes:
  postgres_data:
  pgadmin_data:

networks:
  backend_network:
    driver: bridge
